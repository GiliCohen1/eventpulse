version: '3.9'

services:
  # ─── Databases ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventpulse-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: eventpulse_secret
      POSTGRES_DB: eventpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventpulse']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: eventpulse-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: eventpulse
      MONGO_INITDB_ROOT_PASSWORD: eventpulse_secret
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eventpulse-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --requirepass eventpulse_secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'eventpulse_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: eventpulse-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: eventpulse-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: eventpulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/bash', '/scripts/create-topics.sh']
    volumes:
      - ./infra/kafka/create-topics.sh:/scripts/create-topics.sh:ro

  # ─── Backend Services ─────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: eventpulse-api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file: .env
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eventpulse_secret
      KAFKA_BROKERS: kafka:29092
      USER_SERVICE_URL: http://user-service:3001
      EVENT_SERVICE_URL: http://event-service:3002
      TICKET_SERVICE_URL: http://ticket-service:3003
      CHAT_SERVICE_URL: http://chat-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      ANALYTICS_SERVICE_URL: http://analytics-service:3006

  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    container_name: eventpulse-user-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: eventpulse_secret
      POSTGRES_DB: eventpulse
      KAFKA_BROKERS: kafka:29092

  event-service:
    build:
      context: .
      dockerfile: ./apps/event-service/Dockerfile
    container_name: eventpulse-event-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: eventpulse_secret
      POSTGRES_DB: eventpulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eventpulse_secret
      KAFKA_BROKERS: kafka:29092

  ticket-service:
    build:
      context: .
      dockerfile: ./apps/ticket-service/Dockerfile
    container_name: eventpulse-ticket-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: eventpulse_secret
      POSTGRES_DB: eventpulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eventpulse_secret
      KAFKA_BROKERS: kafka:29092

  chat-service:
    build:
      context: .
      dockerfile: ./apps/chat-service/Dockerfile
    container_name: eventpulse-chat-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3004
      MONGO_URI: mongodb://eventpulse:eventpulse_secret@mongodb:27017/?authSource=admin
      MONGO_DB_CHAT: eventpulse_chat
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: eventpulse_secret
      KAFKA_BROKERS: kafka:29092

  notification-service:
    build:
      context: .
      dockerfile: ./apps/notification-service/Dockerfile
    container_name: eventpulse-notification-service
    restart: unless-stopped
    ports:
      - '3005:3005'
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3005
      MONGO_URI: mongodb://eventpulse:eventpulse_secret@mongodb:27017/?authSource=admin
      MONGO_DB_NOTIFICATIONS: eventpulse_notifications
      KAFKA_BROKERS: kafka:29092

  analytics-service:
    build:
      context: .
      dockerfile: ./apps/analytics-service/Dockerfile
    container_name: eventpulse-analytics-service
    restart: unless-stopped
    ports:
      - '3006:3006'
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3006
      MONGO_URI: mongodb://eventpulse:eventpulse_secret@mongodb:27017/?authSource=admin
      MONGO_DB_ANALYTICS: eventpulse_analytics
      KAFKA_BROKERS: kafka:29092

  # ─── Client ───────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: ./apps/client/Dockerfile
    container_name: eventpulse-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  zookeeper_data:
  kafka_data:
